    <!-- Early language resolve so html lang matches before the app bundle runs. -->
    <script>
      (function () {
        var KEY = 'magies-shell-lang'
        var IDS = { zh: 1, 'zh-TW': 1, en: 1, ja: 1, ko: 1, de: 1, fr: 1, es: 1, pt: 1, ru: 1 }
        var HTML = {
          zh: 'zh-CN',
          'zh-TW': 'zh-TW',
          en: 'en',
          ja: 'ja',
          ko: 'ko',
          de: 'de',
          fr: 'fr',
          es: 'es',
          pt: 'pt-BR',
          ru: 'ru',
        }
        function detect(nav) {
          var r = String(nav || 'en')
            .toLowerCase()
            .replace('_', '-')
          if (
            r.indexOf('zh-tw') === 0 ||
            r.indexOf('zh-hk') === 0 ||
            r.indexOf('zh-mo') === 0 ||
            r === 'zh-hant'
          )
            return 'zh-TW'
          if (r.indexOf('zh') === 0) return 'zh'
          if (r.indexOf('ja') === 0) return 'ja'
          if (r.indexOf('ko') === 0) return 'ko'
          if (r.indexOf('de') === 0) return 'de'
          if (r.indexOf('fr') === 0) return 'fr'
          if (r.indexOf('es') === 0) return 'es'
          if (r.indexOf('pt') === 0) return 'pt'
          if (r.indexOf('ru') === 0) return 'ru'
          if (r.indexOf('en') === 0) return 'en'
          return 'en'
        }
        var lang = null
        try {
          var q = new URLSearchParams(location.search).get('lang')
          if (q && IDS[q]) lang = q
        } catch (e) {}
        if (!lang) {
          try {
            var s = localStorage.getItem(KEY)
            if (s && IDS[s]) lang = s
          } catch (e) {}
        }
        if (!lang) {
          try {
            lang = detect(navigator.language)
          } catch (e) {
            lang = 'en'
          }
        }
        document.documentElement.lang = HTML[lang] || 'en'
        document.documentElement.setAttribute('data-boot-lang', lang)
      })()
    </script>

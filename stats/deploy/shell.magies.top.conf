server {
    listen 80;
    server_name shell.magies.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name shell.magies.top;

    ssl_certificate     /etc/ssl/cf/dify_fullchain.pem;
    ssl_certificate_key /etc/ssl/cf/dify.magies.top.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Restore the real client IP only when the immediate peer is Cloudflare.
    # Without this, a client that reaches origin directly can forge CF-Connecting-IP.
    include /etc/nginx/cloudflare-realip.conf;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    server_tokens off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Fonts are self-hosted; connect-src still allows GitHub API for release metadata only.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://api.github.com; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=()" always;

    root /var/www/shell.magies.top;
    index index.html;

    location = /stats {
        return 301 /stats/;
    }

    location ^~ /stats/ {
        try_files $uri $uri/ /stats/index.html;
    }

    location ^~ /stats-api/ {
        proxy_pass http://127.0.0.1:8787/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # After real_ip processing, $remote_addr is the Cloudflare client IP (or
        # the direct peer when not from CF). Never forward client-supplied
        # CF-Connecting-IP / X-Forwarded-For values unchanged.
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
    }

    # HTML should revalidate quickly after deploys (Cloudflare may still edge-cache briefly).
    location = /index.html {
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://api.github.com; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=()" always;
        try_files $uri =404;
    }

    # Changelog snapshot — short TTL so sync:changelog deploys show up soon.
    location = /changelog.md {
        default_type text/markdown;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Vite hashed bundles — long cache + immutable.
    # Re-declaring add_header here drops the server-level headers per nginx
    # inheritance rules, so restate HSTS (the one that matters on subresources).
    location ^~ /assets/ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Images / fonts (rename files when content changes to bust CDN).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?|md)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://api.github.com; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=()" always;
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css text/markdown application/javascript application/json image/svg+xml;
}
